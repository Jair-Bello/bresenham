<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>Algoritmo de Bresenham</h1>
    
    <!--//se agrega el cuadro donde el usuario ingresa las coordenadas-->
    <!--entrada de coordenadas-->
    <label>X0:</label>
    <input type="number" id="x0">

    <label>Y0:</label>
    <input type="number" id="y0">

    <label>X1:</label>
    <input type="number" id="x1">

    <label>Y1:</label>
    <input type="number" id="y1">

    <button id="drawBtn">Dibujar Línea</button>

    <br><br>

    <!--//se agrega el canva-->
    <!-- Área de dibujo -->
    <canvas id="canvas" width="600" height="600" style="border:1px solid black;"></canvas>

    <h2>Pasos del Algoritmo</h2>

    <table border="1" id="stepsTable">
        <thead>
            <tr>
                <th>Paso</th>
                <th>X</th>
                <th>Y</th>
                <th>Error</th>
                <th>E2</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    
    <script src="script.js"></script>
</body>
</html>
